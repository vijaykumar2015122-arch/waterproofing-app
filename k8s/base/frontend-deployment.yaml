apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vijaym1999/waterproofing-frontend:e3639fdecf6b4e024cb958ee0832214ee3510342
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
