apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vijaym1999/waterproofing-frontend:c5d7c75c4e94a798cc956d7b21d1c02de5208351
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
