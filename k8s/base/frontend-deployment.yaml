apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vijaym1999/waterproofing-frontend:fbf2bc96cead2800cecd826166cc68eee44271b1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
