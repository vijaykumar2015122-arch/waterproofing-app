apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vijaym1999/waterproofing-frontend:77c02a075ed7a67a3eb8116f0a314bc11ba88199
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
