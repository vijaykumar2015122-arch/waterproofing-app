apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vijaym1999/waterproofing-frontend:7fdca833d9a5a066887115c63daa7ae8a318042f
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
