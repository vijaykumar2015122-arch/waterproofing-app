apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: vijaym1999/waterproofing-frontend:3a6b241c1a20dad434f748e30b5c13c4a8422b71
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
