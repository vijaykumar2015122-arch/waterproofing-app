apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: vijaym1999/waterproofing-backend:6cd5d01d1bd8a21cd31f396c4256a6a49c33a651
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000

        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_HOST

        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_NAME

        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: backend-config
              key: DB_USER

        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: DB_PASSWORD

        - name: APPINSIGHTS_CONNECTION_STRING
          value: "InstrumentationKey=46e60640-562a-4bbf-834e-4717fae9dcc9;IngestionEndpoint=https://centralindia-0.in.applicationinsights.azure.com/;LiveEndpoint=https://centralindia.livediagnostics.monitor.azure.com/;ApplicationId=dd18984f-30d2-4dca-aee4-2cd4b462d8c6"

        # 🔥 Datadog APM ENV (NEW)
        - name: DD_AGENT_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP

        - name: DD_SERVICE
          value: backend

        - name: DD_ENV
          value: prod

        - name: DD_VERSION
          value: v1
