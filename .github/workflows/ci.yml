name: CI - Build, Push, Update Manifests

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'k8s/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

    - name: Docker Login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build Backend
      run: |
        docker build --no-cache -t vijaym1999/waterproofing-backend:${IMAGE_TAG} ./backend
        docker push vijaym1999/waterproofing-backend:${IMAGE_TAG}

    - name: Build Frontend
      run: |
        docker build --no-cache -t vijaym1999/waterproofing-frontend:${IMAGE_TAG} ./frontend
        docker push vijaym1999/waterproofing-frontend:${IMAGE_TAG}

    - name: Update manifests
      run: |
        sed -i "s|image: vijaym1999/waterproofing-backend:.*|image: vijaym1999/waterproofing-backend:${IMAGE_TAG}|g" k8s/base/backend-deployment.yaml
        sed -i "s|image: vijaym1999/waterproofing-frontend:.*|image: vijaym1999/waterproofing-frontend:${IMAGE_TAG}|g" k8s/base/frontend-deployment.yaml

    - name: Commit changes
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add .
        git commit -m "update image tag ${IMAGE_TAG}" || echo "no changes"
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
